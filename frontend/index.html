<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }} — AI Code Review</title>
    <meta name="description" content="{{ tagline }}" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', path='css/style.css') }}"
    />
  </head>
  <body>
    <div class="app-shell">
      <!-- ============================= HEADER ============================= -->
      <header class="app-header">
        <div class="app-header__brand">
          <span class="app-header__mark" aria-hidden="true">&gt;_</span>
          <div class="app-header__titles">
            <h1 class="app-header__title">{{ app_name }}</h1>
            <p class="app-header__subtitle">{{ tagline }}</p>
          </div>
        </div>
        <div class="app-header__status" id="apiStatus" title="Engine status">
          <span class="status-dot" data-state="idle"></span>
          <span class="status-label">Idle</span>
        </div>
      </header>

      <!-- ============================== MAIN =============================== -->
      <main class="app-main">
        <!-- ---------------------------- INPUT PANEL ---------------------------- -->
        <section class="panel input-panel" aria-labelledby="inputPanelTitle">
          <div class="panel__header">
            <h2 class="panel__title" id="inputPanelTitle">Review</h2>
          </div>

          <div class="panel__body">
            <!-- Mode selector -->
            <div class="field">
              <label class="field__label" for="modeSelect">Mode</label>
              <select id="modeSelect" class="select" name="mode">
                <optgroup label="Persona" id="personaGroup"></optgroup>
                <optgroup label="Analysis" id="analysisGroup"></optgroup>
              </select>
              <p class="field__hint" id="modeTagline">&nbsp;</p>
            </div>

            <!-- Action selector (persona modes only) -->
            <div class="field" id="actionField">
              <span class="field__label">Action</span>
              <div
                class="segmented"
                id="actionSegmented"
                role="radiogroup"
                aria-label="Action"
              >
                <button
                  type="button"
                  class="segmented__option is-active"
                  data-action="roast"
                  role="radio"
                  aria-checked="true"
                >
                  Roast
                </button>
                <button
                  type="button"
                  class="segmented__option"
                  data-action="fix"
                  role="radio"
                  aria-checked="false"
                >
                  Roast + Fix
                </button>
                <button
                  type="button"
                  class="segmented__option"
                  data-action="explain"
                  role="radio"
                  aria-checked="false"
                >
                  Roast + Explain
                </button>
              </div>
            </div>

            <!-- Language -->
            <div class="field">
              <label class="field__label" for="languageSelect">Language</label>
              <select id="languageSelect" class="select">
                <option value="python" selected>Python</option>
                <option value="javascript">JavaScript</option>
                <option value="typescript">TypeScript</option>
                <option value="java">Java</option>
                <option value="c">C</option>
                <option value="cpp" selected>C++</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
                <option value="csharp">C#</option>
                <option value="other">Other</option>
              </select>
            </div>

            <!-- Code input -->
            <div class="field field--grow">
              <div class="field__label-row">
                <label class="field__label" for="codeInput">Code</label>
                <span class="char-counter" id="charCounter">0 / 10000</span>
              </div>
              <textarea
                id="codeInput"
                class="code-input"
                spellcheck="false"
                autocomplete="off"
                autocapitalize="off"
                maxlength="10000"
                placeholder="Paste code to review…"
              ></textarea>
              <p class="field__error" id="codeError"></p>
            </div>

            <!-- Actions -->
            <div class="panel__actions">
              <button type="button" class="btn btn--ghost" id="clearBtn">
                Clear
              </button>
              <button type="button" class="btn btn--primary" id="runBtn">
                <span class="btn__label">Run Review</span>
                <span class="btn__spinner" aria-hidden="true"></span>
              </button>
            </div>
          </div>
        </section>

        <!-- --------------------------- RESULTS PANEL --------------------------- -->
        <section
          class="panel results-panel"
          aria-labelledby="resultsPanelTitle"
        >
          <div class="panel__header">
            <h2 class="panel__title" id="resultsPanelTitle">Results</h2>
            <div class="panel__meta" id="resultsMeta"></div>
          </div>

          <div class="panel__body panel__body--results" id="resultsBody">
            <!-- Empty state -->
            <div class="state state--empty" id="emptyState">
              <div class="state__icon" aria-hidden="true">
                <svg
                  width="28"
                  height="28"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.4"
                >
                  <path
                    d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"
                  />
                  <path d="M15 3h6v6" />
                  <path d="M10 14 21 3" />
                </svg>
              </div>
              <p class="state__title">No review yet</p>
              <p class="state__desc">
                Select a mode, paste your code, and run a review to see output
                here.
              </p>
            </div>

            <!-- Loading state -->
            <div class="state state--loading" id="loadingState" hidden>
              <div class="loading-lines">
                <span></span><span></span><span></span>
              </div>
              <p class="state__desc" id="loadingLabel">Running review…</p>
            </div>

            <!-- Error state -->
            <div class="state state--error" id="errorState" hidden>
              <div class="state__icon state__icon--error" aria-hidden="true">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.6"
                >
                  <circle cx="12" cy="12" r="9" />
                  <line x1="12" y1="8" x2="12" y2="13" />
                  <line x1="12" y1="16" x2="12" y2="16.01" />
                </svg>
              </div>
              <p class="state__title" id="errorTitle">Something went wrong</p>
              <p class="state__desc" id="errorDetail"></p>
              <p class="state__code" id="errorCode"></p>
            </div>

            <!-- Results output -->
            <div class="results-output" id="resultsOutput" hidden></div>
          </div>
        </section>
      </main>

      <!-- ============================= FOOTER ============================= -->
      <footer class="app-footer">
        <span>{{ app_name }} · v1.0.0</span>
        <span class="app-footer__sep">·</span>
        <span>Output is generated by an LLM and may be imprecise</span>
      </footer>
    </div>

    <!-- Server-rendered config, consumed by app.js -->
    <script id="app-config" type="application/json">
      {
        "modes": {{ modes | tojson }},
        "defaultMode": {{ default_mode | tojson }},
        "routes": {{ routes | tojson }}
      }
    </script>

    <script src="{{ url_for('static', path='js/app.js') }}" defer></script>
  </body>
</html>
